# Fix colors
set -g default-terminal 'tmux-256color'
set-option -as terminal-overrides ",xterm*:Tc"

# Fix hyperlinks
set -as terminal-features ",*:hyperlinks"

# Remap prefix from Ctrl + b to Ctrl + Space
unbind C-b
set-option -g prefix C-Space
bind C-Space send-prefix

# Remove 0-based container indexing
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Enable mouse control
set -g mouse on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# =============================================================================
# Arctic tmux theme
# Ported from arctic.nvim (VSCode Dark+ theme) by rockyzhang24
# https://github.com/rockyzhang24/arctic.nvim
# =============================================================================
 
# ── Color palette reference ──────────────────────────────────────────────────
#   norm_bg      #1E1E1E    main background
#   norm_fg      #D4D4D4    main foreground
#   black        #2D2D2D    tab/elevated surfaces
#   black2       #252526    statusline / darker surface
#   black3       #2A2D2E    cursorline / hover
#   gray         #51504F    subtle borders
#   gray2        #858585    line numbers / muted text
#   gray3        #808080    inactive text
#   dark_blue    #569CD6    keywords / accent
#   blue         #4FC1FF    bright blue
#   info_blue    #3794FF    information highlights
#   blue_green   #4EC9B0    types / cyan accent
#   green        #6A9955    strings / green
#   light_green  #B5CEA8    numbers
#   yellow       #DCDCAA    functions
#   dark_pink    #C586C0    control flow / magenta
#   error_red    #F14C4C    errors
#   white        #FFFFFF    bright white
# ─────────────────────────────────────────────────────────────────────────────
 
# ── Status bar ───────────────────────────────────────────────────────────────
 
set -g status-style "bg=#252526,fg=#858585"
set -g status-position bottom
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100
 
# Left: session name
set -g status-left "#[bg=#569CD6,fg=#1E1E1E,bold] #S #[bg=#252526,fg=#569CD6,nobold] "
 
# Right: host and time
set -g status-right ""
 
# ── Window tabs ──────────────────────────────────────────────────────────────
 
# Inactive window
set -g window-status-format "#[fg=#808080,bg=#252526]  #I #[fg=#51504F]│ #[fg=#808080]#W  "
 
# Active window
set -g window-status-current-format "#[fg=#1E1E1E,bg=#569CD6] #[fg=#569CD6,bg=#181818,bold] #I #[fg=#51504F]│ #[fg=#D4D4D4]#W #[fg=#1E1E1E,bg=#569CD6] "
 
set -g window-status-separator ""
 
# ── Pane borders ─────────────────────────────────────────────────────────────
 
set -g pane-border-style "fg=#51504F"
set -g pane-active-border-style "fg=#569CD6"
 
# ── Messages & command line ──────────────────────────────────────────────────
 
set -g message-style "bg=#252526,fg=#D4D4D4"
set -g message-command-style "bg=#252526,fg=#D4D4D4"
 
# ── Copy mode highlight ─────────────────────────────────────────────────────
 
set -g mode-style "bg=#094771,fg=#D4D4D4"
 
# ── Clock ────────────────────────────────────────────────────────────────────
 
set -g clock-mode-colour "#569CD6"
 
# ── Bell / activity ─────────────────────────────────────────────────────────
 
set -g window-status-activity-style "fg=#DCDCAA,bg=#252526"
set -g window-status-bell-style "fg=#F14C4C,bg=#252526"
 
# ── Display pane indicators ─────────────────────────────────────────────────
 
set -g display-panes-active-colour "#569CD6"
set -g display-panes-colour "#51504F"
 
